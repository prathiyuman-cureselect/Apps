<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petsync ServiceProvider – Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --brand: #E37383;
            --brand-dark: #c45566;
            --brand-light: #fff0f2;
            --brand-glow: rgba(227, 115, 131, 0.25);
            --text: #2d2d44;
            --muted: #7a7a95;
            --bg: #fdfafb;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- Animated Background --- */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: move 25s infinite alternate;
        }
        .blob-1 { width: 500px; height: 500px; background: #ffeef0; top: -10%; right: -5%; }
        .blob-2 { width: 400px; height: 400px; background: #f2ebff; bottom: -5%; left: -5%; animation-delay: -7s; }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(60px, 120px) rotate(30deg); }
        }

        /* --- Premium Card --- */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            padding: 3.5rem 2.5rem;
            max-width: 440px;
            width: 100%;
            text-align: center;
            animation: cardEntrance 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- Logo Section --- */
        .logo-circle {
            width: 95px; height: 95px;
            border-radius: 24px;
            background: var(--white);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 24px rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.02);
            border: 1px solid #f2f2f2;
            margin: 0 auto 1.5rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            padding: 15px;
        }
        .logo-circle::after {
            content: ''; position: absolute; inset: 0; border-radius: 24px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,1), inset 0 -2px 4px rgba(0,0,0,0.02);
        }
        .logo-circle:hover { transform: translateY(-8px) rotate(3deg); }
        .logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        .app-name {
            font-family: 'Nunito', sans-serif;
            font-size: 2.1rem;
            font-weight: 900;
            letter-spacing: -0.8px;
            margin-bottom: 0.5rem;
        }
        .app-name span { color: var(--brand); }

        .tagline {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 400;
        }

        /* --- Staggered Feature Pills --- */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 2.5rem;
        }
        .pill {
            background: rgba(255,255,255,0.6);
            border: 1px solid #eee;
            padding: 12px;
            border-radius: 18px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            animation: fadeInPill 0.5s ease backwards;
        }
        .pill:nth-child(1) { animation-delay: 0.4s; }
        .pill:nth-child(2) { animation-delay: 0.5s; }
        .pill:nth-child(3) { animation-delay: 0.6s; }
        .pill:nth-child(4) { animation-delay: 0.7s; }

        @keyframes fadeInPill {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pill svg { width: 18px; height: 18px; fill: var(--brand); }

        /* --- Professional Download Button --- */
        .btn-container { width: 100%; position: relative; }
        
        .btn-download {
            position: relative;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: #fff;
            border-radius: 20px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 15px 30px var(--brand-glow);
            transition: all 0.3s ease;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        /* Progress Bar inside button */
        .btn-progress {
            position: absolute; bottom: 0; left: 0; height: 4px;
            background: rgba(255,255,255,0.4);
            width: 0%; transition: width 2s ease;
        }

        .btn-download:active { transform: scale(0.97); }
        
        .btn-download.success {
            background: #4CAF50;
            box-shadow: 0 15px 30px rgba(76, 175, 80, 0.25);
        }

        .version {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 1.2rem;
            display: block;
        }

        /* --- Loading Overlay --- */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center; justify-content: center; flex-direction: column;
        }
        #loading-overlay.active { display: flex; }

        .spinner-ring {
            width: 60px; height: 60px;
            border: 4px solid var(--brand-light);
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: spin 1s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer { font-size: 0.7rem; margin-top: 3rem; color: #b0b0c8; font-weight: 500; }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card">
        <div class="logo-circle">
            <img src="./asserts/petsync-logo.png" alt="PetSync360" />
        </div>
        
        <h1 class="app-name">Petsync <span>ServiceProvider</span></h1>
        <p class="tagline">Your all-in-one companion for digital pet care & wellness.</p>

        <div class="features">
            <div class="pill">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                Teleconsult
            </div>
            <div class="pill">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                Pet Retail
            </div>
            <div class="pill">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
                Secure Pay
            </div>
            <div class="pill">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                Petcare Services
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-download" id="dlBtn" onclick="initDownload()">
                <span id="btnText">Download for Android</span>
                <svg id="btnIcon" style="width:22px; height:22px" fill="currentColor" viewBox="0 0 24 24"><path d="M5 20h14v-2H5m14-9h-4V3H9v6H5l7 7 7-7z"/></svg>
                <div class="btn-progress" id="progress"></div>
            </button>
        </div>

        <span class="version">v1.0.2 • 107.3 MB • Verified APK</span>

        <p class="footer">© 2026 PetSync360 • Built for Pet Parents</p>
    </div>

    <div id="loading-overlay">
        <div class="spinner-ring"></div>
        <p style="margin-top:20px; font-weight:600; color:var(--text)">Handshaking with secure server...</p>
    </div>

    <script>
        function initDownload() {
            const btn = document.getElementById('dlBtn');
            const text = document.getElementById('btnText');
            const icon = document.getElementById('btnIcon');
            const progress = document.getElementById('progress');
            const overlay = document.getElementById('loading-overlay');
            
            // Step 1: Show server handshake
            overlay.classList.add('active');

            setTimeout(() => {
                overlay.classList.remove('active');
                
                // Step 2: Start button progress
                text.innerText = "Downloading...";
                progress.style.width = "100%";
                
                // Step 3: Completion state
                setTimeout(() => {
                    btn.classList.add('success');
                    text.innerText = "Download Started!";
                    icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';
                    
                    // Final: Trigger actual file download from GitHub Release
                    window.location.href = "https://github.com/prathiyuman-cureselect/Apps/releases/download/ServiceProvider/app-release.apk";
                }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
